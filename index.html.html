<!DOCTYPE html>
<html lang="hi">
<head>
    <script src="https://adsfire.online/assets/ads/ad.js" class="adScriptClass"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$100 Earn Click Here</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: #1a3b5d;
            font-size: 4rem;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            margin-top: auto;
        }
        
        .mouse-arrow {
            position: fixed;
            width: 26px;
            height: 35px;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
        }
        
        .mouse-arrow svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #0078ff, #00c6ff);
            width: 0%;
            transition: width 0.1s linear;
            z-index: 10001;
            box-shadow: 0 0 15px #0078ff;
        }
        
        .status-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a3b5d;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10000;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .hidden-iframe {
            display: none;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="status-box" id="statusBox">⏰ 3 सेकंड में क्लिक...</div>
    
    <h1>$100 Earn Click Here</h1>

    <div class="ad-container">
        <div class='MainAdverTiseMentDiv' id="adElement" data-publisher="eyJpdiI6IjNBc1BlTzBEeEZBaHBLMlo1SmdBREE9PSIsInZhbHVlIjoieXhRUkRXVmU1YmkraWJkdU1xcDNkQT09IiwibWFjIjoiMDNkN2RjMWI2OThhZThmMWQzMjdjOTc0Zjc0ZjNkY2E5YTg3OTMwYzFjNTVjOTQ1NmE0MDRhNGM2YjBlZDQ5NyIsInRhZyI6IiJ9" data-adsize="250x250"></div>
    </div>
    
    <div class="mouse-arrow" id="mouseArrow">
        <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2L2 27L8 21L12 26L16 22L12 17L18 17L2 2Z" 
                  fill="white" 
                  stroke="#333333" 
                  stroke-width="1.5" 
                  stroke-linejoin="round"/>
            <path d="M8 12L12 16M12 16L16 12M12 16L12 21" 
                  stroke="#666666" 
                  stroke-width="1.2" 
                  stroke-linecap="round"/>
        </svg>
        <div style="position: absolute; top: 2px; left: 2px; width: 100%; height: 100%; opacity: 0.3; z-index: -1; filter: blur(1px);">
            <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2L2 27L8 21L12 26L16 22L12 17L18 17L2 2Z" fill="black"/>
            </svg>
        </div>
    </div>

    <!-- Hidden iframe for popup bypass -->
    <iframe class="hidden-iframe" id="popupFrame" name="popupFrame"></iframe>

    <script>
        (function() {
            const adElement = document.querySelector('.MainAdverTiseMentDiv');
            const mouseArrow = document.getElementById('mouseArrow');
            const progressBar = document.getElementById('progressBar');
            const statusBox = document.getElementById('statusBox');
            const popupFrame = document.getElementById('popupFrame');
            
            let secondsLeft = 3;
            let clickAttempted = false;
            
            // Function to update status
            function updateStatus(text) {
                statusBox.textContent = text;
            }
            
            // Move arrow to ad
            function moveArrowToAd() {
                if (adElement) {
                    const rect = adElement.getBoundingClientRect();
                    const targetX = rect.left + (rect.width / 2) - 13;
                    const targetY = rect.top + (rect.height / 2) - 20;
                    
                    mouseArrow.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    mouseArrow.style.left = targetX + 'px';
                    mouseArrow.style.top = targetY + 'px';
                }
            }
            
            // Function to open URL bypassing popup blocker
            function openURL(url) {
                if (!url) return false;
                
                try {
                    // Method 1: Try to open in same window
                    if (url.startsWith('http')) {
                        window.location.href = url;
                        return true;
                    }
                    
                    // Method 2: Try using iframe
                    if (popupFrame) {
                        popupFrame.src = url;
                        return true;
                    }
                    
                    // Method 3: Create temporary form
                    const form = document.createElement('form');
                    form.method = 'GET';
                    form.action = url;
                    form.target = '_blank';
                    document.body.appendChild(form);
                    form.submit();
                    document.body.removeChild(form);
                    return true;
                    
                } catch (e) {
                    console.log('URL open failed:', e);
                    return false;
                }
            }
            
            // Main click function
            function performClick() {
                if (clickAttempted) return;
                clickAttempted = true;
                
                updateStatus('⚡ क्लिक हो रहा है...');
                
                if (!adElement) {
                    updateStatus('❌ एड नहीं मिला');
                    return;
                }
                
                try {
                    // Arrow animation
                    mouseArrow.style.transform = 'translate(1px, 1px) scale(0.98)';
                    setTimeout(() => {
                        mouseArrow.style.transform = 'translate(0, 0) scale(1)';
                    }, 100);
                    
                    // Update progress bar
                    progressBar.style.background = 'linear-gradient(90deg, #00ff00, #00cc00)';
                    
                    // Method 1: Try to find and click actual links
                    const allLinks = document.querySelectorAll('a[href]');
                    let clicked = false;
                    
                    allLinks.forEach(link => {
                        if (!clicked && (link.contains(adElement) || adElement.contains(link) || link.href.includes('ads'))) {
                            if (link.href && !link.href.startsWith('javascript:')) {
                                clicked = openURL(link.href);
                                if (clicked) {
                                    updateStatus('✅ क्लिक सफल!');
                                }
                            }
                        }
                    });
                    
                    // Method 2: Try to find ad iframe
                    const iframes = document.querySelectorAll('iframe');
                    iframes.forEach(iframe => {
                        if (iframe.src && iframe.src.includes('http')) {
                            clicked = openURL(iframe.src);
                        }
                    });
                    
                    // Method 3: Direct ad element click
                    const clickEvent = new MouseEvent('click', {
                        view: window,
                        bubbles: true,
                        cancelable: true
                    });
                    adElement.dispatchEvent(clickEvent);
                    
                    // Method 4: Look for ad link in parent elements
                    if (!clicked) {
                        let parent = adElement.parentElement;
                        for (let i = 0; i < 5; i++) {
                            if (parent && parent.tagName === 'A' && parent.href) {
                                clicked = openURL(parent.href);
                                break;
                            }
                            if (parent) parent = parent.parentElement;
                        }
                    }
                    
                    // Method 5: Try to extract from onclick attribute
                    if (!clicked && adElement.getAttribute('onclick')) {
                        const onclick = adElement.getAttribute('onclick');
                        const match = onclick.match(/['"](https?:\/\/[^'"]+)['"]/);
                        if (match && match[1]) {
                            clicked = openURL(match[1]);
                        }
                    }
                    
                    // Final fallback - open Google if nothing works
                    if (!clicked) {
                        setTimeout(() => {
                            if (!clicked) {
                                updateStatus('🔄 रीडायरेक्ट...');
                                window.location.href = 'https://www.google.com';
                            }
                        }, 500);
                    }
                    
                } catch (error) {
                    console.log('Click error:', error);
                    updateStatus('❌ एरर, रीट्राई...');
                    
                    // Fallback
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 500);
                }
            }
            
            // Timer function
            function updateCounter() {
                const progress = ((3 - secondsLeft) / 3) * 100;
                progressBar.style.width = progress + '%';
                
                if (secondsLeft > 0) {
                    updateStatus(`⏰ ${secondsLeft} सेकंड में क्लिक...`);
                    
                    // Hover effect
                    mouseArrow.style.transform = 'translateY(-1px)';
                    setTimeout(() => {
                        mouseArrow.style.transform = 'translateY(0)';
                    }, 200);
                    
                    secondsLeft--;
                    setTimeout(updateCounter, 1000);
                } else {
                    performClick();
                }
            }
            
            // Initialize
            window.addEventListener('load', function() {
                setTimeout(() => {
                    moveArrowToAd();
                    
                    mouseArrow.style.transition = 'none';
                    mouseArrow.style.left = '50%';
                    mouseArrow.style.top = '20%';
                    
                    setTimeout(() => {
                        moveArrowToAd();
                        updateCounter();
                    }, 100);
                    
                }, 1000);
            });
            
            // Handle resize
            window.addEventListener('resize', moveArrowToAd);
            window.addEventListener('scroll', moveArrowToAd);
            
            // Try to pre-allow popups by creating a user interaction
            document.addEventListener('click', function() {
                // Create a dummy popup to establish permission
                const dummy = window.open('about:blank', '_blank');
                if (dummy) {
                    dummy.close();
                }
                if (secondsLeft > 0) {
                    secondsLeft = 1; // Speed up if user clicks
                }
            }, { once: true });
            
            // Create invisible clickable area
            const clickCatcher = document.createElement('div');
            clickCatcher.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; opacity:0; z-index:9998;';
            clickCatcher.onclick = function() {
                if (secondsLeft > 0) {
                    secondsLeft = 1;
                }
            };
            document.body.appendChild(clickCatcher);
            
            console.log('Auto-click system ready - Popup blocker bypass active');
            
        })();
    </script>
</body>
</html>
