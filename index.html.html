<!DOCTYPE html>
<html lang="hi">
<head>
    <script src="https://adsfire.online/assets/ads/ad.js" class="adScriptClass"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$100 Earn Click Here</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            position: relative;
            cursor: default;
        }
        
        h1 {
            color: #1a3b5d;
            font-size: 4rem;
            text-align: center;
            margin: 0;
            padding: 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            margin-top: auto;
        }
        
        /* रियल माउस एरो स्टाइल */
        .mouse-arrow {
            position: fixed;
            width: 26px;
            height: 35px;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
            will-change: transform;
        }
        
        .mouse-arrow svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .arrow-shadow {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            z-index: -1;
            filter: blur(1px);
        }
        
        /* प्रोग्रेस बार */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #0078ff, #00c6ff);
            width: 0%;
            transition: width 0.1s linear;
            z-index: 10001;
            box-shadow: 0 0 15px #0078ff;
            opacity: 0;
            pointer-events: none;
        }
        
        /* नोटिफिकेशन स्टाइल */
        .click-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a3b5d;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .click-notification.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="click-notification" id="notification">⏰ 3 सेकंड में ऑटो-क्लिक...</div>
    
    <h1>$100 Earn Click Here</h1>

    <div class="ad-container">
        <div class='MainAdverTiseMentDiv' id="adElement" data-publisher="eyJpdiI6IjNBc1BlTzBEeEZBaHBLMlo1SmdBREE9PSIsInZhbHVlIjoieXhRUkRXVmU1YmkraWJkdU1xcDNkQT09IiwibWFjIjoiMDNkN2RjMWI2OThhZThmMWQzMjdjOTc0Zjc0ZjNkY2E5YTg3OTMwYzFjNTVjOTQ1NmE0MDRhNGM2YjBlZDQ5NyIsInRhZyI6IiJ9" data-adsize="250x250"></div>
    </div>
    
    <div class="mouse-arrow" id="mouseArrow">
        <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2L2 27L8 21L12 26L16 22L12 17L18 17L2 2Z" 
                  fill="white" 
                  stroke="#333333" 
                  stroke-width="1.5" 
                  stroke-linejoin="round"/>
            <path d="M8 12L12 16M12 16L16 12M12 16L12 21" 
                  stroke="#666666" 
                  stroke-width="1.2" 
                  stroke-linecap="round"/>
            <circle cx="14" cy="14" r="2" fill="#0078ff" fill-opacity="0.05"/>
        </svg>
        <div class="arrow-shadow">
            <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2L2 27L8 21L12 26L16 22L12 17L18 17L2 2Z" fill="black"/>
            </svg>
        </div>
    </div>

    <script>
        (function() {
            const adElement = document.querySelector('.MainAdverTiseMentDiv');
            const mouseArrow = document.getElementById('mouseArrow');
            const progressBar = document.getElementById('progressBar');
            const notification = document.getElementById('notification');
            
            let secondsLeft = 3;
            let clickAttempted = false;
            
            // नोटिफिकेशन दिखाएं
            function showNotification(text) {
                notification.textContent = text;
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            }
            
            // माउस एरो को एड पर ले जाएं
            function moveArrowToAd() {
                if (adElement) {
                    const rect = adElement.getBoundingClientRect();
                    const targetX = rect.left + (rect.width / 2) - 13;
                    const targetY = rect.top + (rect.height / 2) - 20;
                    
                    mouseArrow.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    mouseArrow.style.left = targetX + 'px';
                    mouseArrow.style.top = targetY + 'px';
                }
            }
            
            // प्रोग्रेस बार अपडेट करें
            function updateProgressBar() {
                const progress = ((3 - secondsLeft) / 3) * 100;
                progressBar.style.width = progress + '%';
            }
            
            // क्लिक परफॉर्म करने का मुख्य फंक्शन
            function performClick() {
                if (clickAttempted) return;
                clickAttempted = true;
                
                if (!adElement) {
                    console.log('एड एलिमेंट नहीं मिला');
                    return;
                }
                
                try {
                    // नोटिफिकेशन दिखाएं
                    showNotification('⚡ क्लिक हो रहा है...');
                    
                    // एरो एनिमेशन
                    mouseArrow.style.transform = 'translate(1px, 1px) scale(0.98)';
                    setTimeout(() => {
                        mouseArrow.style.transform = 'translate(0, 0) scale(1)';
                    }, 100);
                    
                    // प्रोग्रेस बार अपडेट करें
                    progressBar.style.background = 'linear-gradient(90deg, #00ff00, #00cc00)';
                    
                    // क्लिक इवेंट भेजें
                    const clickEvent = new MouseEvent('click', {
                        view: window,
                        bubbles: true,
                        cancelable: true,
                        clientX: 0,
                        clientY: 0
                    });
                    
                    // एड एलिमेंट पर क्लिक करें
                    adElement.dispatchEvent(clickEvent);
                    
                    // एड के अंदर लिंक ढूंढें और क्लिक करें
                    setTimeout(() => {
                        const adLinks = adElement.querySelectorAll('a');
                        adLinks.forEach(link => {
                            try {
                                if (link.href && !link.href.startsWith('javascript:')) {
                                    // नई विंडो में खोलें
                                    window.open(link.href, '_blank');
                                }
                            } catch (e) {
                                console.log('लिंक क्लिक में समस्या:', e);
                            }
                        });
                        
                        // अगर कोई लिंक नहीं मिला तो पेरेंट एलिमेंट चेक करें
                        const parentLinks = document.querySelectorAll('a[href]');
                        parentLinks.forEach(link => {
                            if (link.contains(adElement) || adElement.contains(link)) {
                                try {
                                    window.open(link.href, '_blank');
                                } catch (e) {
                                    console.log('पेरेंट लिंक क्लिक में समस्या:', e);
                                }
                            }
                        });
                        
                        showNotification('✅ क्लिक सफल!');
                    }, 100);
                    
                } catch (error) {
                    console.log('क्लिक में समस्या:', error);
                    showNotification('❌ क्लिक फेल, रीट्राई...');
                    
                    // फॉलबैक: डायरेक्ट नेविगेशन
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 500);
                }
            }
            
            // टाइमर फंक्शन
            function updateCounter() {
                updateProgressBar();
                
                if (secondsLeft > 0) {
                    // नोटिफिकेशन अपडेट करें
                    showNotification(`⏰ ${secondsLeft} सेकंड में क्लिक...`);
                    
                    // एरो को हल्का हिलाएं
                    mouseArrow.style.transform = 'translateY(-1px)';
                    setTimeout(() => {
                        mouseArrow.style.transform = 'translateY(0)';
                    }, 200);
                    
                    secondsLeft--;
                    setTimeout(updateCounter, 1000);
                } else {
                    // टाइमर खत्म
                    notification.textContent = '⚡ क्लिक हो रहा है...';
                    performClick();
                }
            }
            
            // विंडो रिसाइज और स्क्रॉल हैंडलर
            window.addEventListener('resize', moveArrowToAd);
            window.addEventListener('scroll', moveArrowToAd);
            
            // पेज लोड होने पर
            window.addEventListener('load', function() {
                setTimeout(() => {
                    moveArrowToAd();
                    
                    mouseArrow.style.transition = 'none';
                    mouseArrow.style.left = '50%';
                    mouseArrow.style.top = '20%';
                    
                    setTimeout(() => {
                        moveArrowToAd();
                        
                        // शुरू करें
                        updateCounter();
                        
                    }, 100);
                    
                }, 1000);
            });
            
            // यूजर इंटरैक्शन डिटेक्ट करें
            document.addEventListener('click', function() {
                // अगर यूजर ने क्लिक किया और टाइमर अभी चल रहा है
                if (secondsLeft > 0 && !clickAttempted) {
                    secondsLeft = 1; // टाइमर तेज करें
                }
            }, { once: true });
            
            console.log('ऑटो-क्लिक सिस्टम एक्टिव - 3 सेकंड में क्लिक करेगा');
            
        })();
    </script>
</body>
</html>
